<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenida Sol</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0ede3; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .contenedor { position: relative; width: 1080px; height: 1080px; max-width: 100vw; max-height: 100vw; }
    video { width: 100%; height: 100%; object-fit: contain; }
    .btn-play {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.85); border: none; border-radius: 50%;
      width: 80px; height: 80px; cursor: pointer; font-size: 32px;
      display: flex; align-items: center; justify-content: center;
    }
    .oculto { display: none; }
  </style>
</head>
<body>
  <div class="contenedor">
    <video id="video" loop playsinline>
      <source src="video%20sol%20bienvenida.mp4" type="video/mp4">
    </video>
    <button class="btn-play" id="btn" onclick="reproducir()">&#9654;</button>
  </div>
  <script>
    function reproducir() {
      var video = document.getElementById('video');
      var btn = document.getElementById('btn');
      video.play();
      btn.classList.add('oculto');
    }
  </script>
</body>
</html>
